services:
  - type: web
    name: minddetox-backend
    runtime: node
    rootDir: backend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/preguntas/activas
    buildFilter:
      paths:
        - backend/**
        - render.yaml
    envVars:
      - key: NODE_VERSION
        value: 20.19.0
      - key: MONGODB_URI
        sync: false
      - key: AUTH0_ISSUER_BASE_URL
        sync: false
      - key: AUTH0_AUDIENCE
        sync: false
      - key: CORREO_ADMIN
        sync: false
      - key: ADMIN_SUB
        sync: false
      - key: FRONTEND_URL
        sync: false

  - type: web
    name: minddetox-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./frontend/dist
    buildFilter:
      paths:
        - frontend/**
        - render.yaml
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 20.19.0
      - key: VITE_API_URL
        sync: false
      - key: VITE_AUTH0_DOMAIN
        sync: false
      - key: VITE_AUTH0_CLIENT_ID
        sync: false
      - key: VITE_AUTH0_AUDIENCE
        sync: false
      - key: VITE_AUTH0_CALLBACK_URL
        sync: false
      - key: VITE_ADMIN_EMAIL
        sync: false

